services:
  uetr-tracker:
    build: .
    image: uetr-tracker:latest
    container_name: uetr-tracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # CHANGE THESE before deploying to a server.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-secret-change-me}
      DEFAULT_CHECK_INTERVAL_SECONDS: ${DEFAULT_CHECK_INTERVAL_SECONDS:-300}
      MIN_CHECK_INTERVAL_SECONDS: ${MIN_CHECK_INTERVAL_SECONDS:-30}
      # PAYMENT_API_URL_TEMPLATE: "https://.../{uetr}/status-summary"
    volumes:
      - uetr-data:/data

volumes:
  uetr-data:
