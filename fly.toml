# fly.toml app configuration file generated for banktransactiontracker on 2026-06-05T19:29:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'banktransactiontracker'
primary_region = 'syd'

[build]

[env]
  DB_PATH = '/data/uetr.db'
  NODE_ENV = 'production'

[[mounts]]
  source = 'tracker_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
