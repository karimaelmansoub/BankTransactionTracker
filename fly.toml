app = 'banktransactiontracker'
primary_region = 'syd'

[build]

[env]
  NODE_ENV = 'production'
  DB_PATH  = '/data/uetr.db'

[mounts]
  source      = 'tracker_data'
  destination = '/data'

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory   = '512mb'
  cpu_kind = 'shared'
  cpus     = 1
